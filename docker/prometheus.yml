# Prometheus Configuration for Mini-Medallion
# ==============================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "questdb"
    static_configs:
      - targets: ["questdb:9000"]

  - job_name: "medallion-pipeline"
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
