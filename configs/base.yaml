# ============================================================
# Mini-Medallion Gold Trading Engine — Master Configuration
# ============================================================
# This file is the SINGLE source of truth for all system params.
# Override per-environment with configs/dev.yaml, configs/prod.yaml
# ============================================================

project:
  name: "mini-medallion"
  version: "0.1.0"
  asset: "XAU/USD"
  mode: "paper"  # paper | live

# --- Database Connections ---
database:
  questdb:
    host: "localhost"
    port: 9009           # ILP ingestion port
    http_port: 9000      # REST/SQL port
    database: "medallion"
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: ""
  minio:
    host: "localhost"
    port: 9100
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "medallion-data"

# --- Data Sources ---
data:
  gold:
    symbol: "GC=F"           # Yahoo Finance gold futures
    spot_symbol: "XAUUSD=X"  # XAU/USD spot
    interval: "1m"           # 1-minute bars for dev
    history_years: 10
  macro:
    dxy_symbol: "DX-Y.NYB"
    vix_symbol: "^VIX"
    tlt_symbol: "TLT"       # Treasury proxy
    tips_symbol: "TIP"      # TIPS proxy
    silver_symbol: "SI=F"   # Silver futures (for Gold/Silver ratio)
    oil_symbol: "CL=F"      # Crude Oil futures (for Gold/Oil ratio)
    cny_symbol: "CNY=X"     # CNY/USD
  fred:
    api_key: "${FRED_API_KEY}"
    series:
      - "DFF"               # Fed Funds Rate
      - "DFII10"            # 10Y Real Yield
      - "T10Y2Y"            # Yield curve
      - "DTWEXBGS"          # Trade-weighted USD
  alternative:
    newsapi_key: "${NEWSAPI_KEY}"
    cot_url: "https://www.cftc.gov/dea/newcot/deafut.txt"
    google_trends_keywords: ["buy gold", "gold price", "safe haven"]
    etf_symbols: ["GLD", "IAU"]

# --- Feature Engineering ---
features:
  lookback_windows: [5, 10, 20, 50, 100, 200]
  volatility_windows: [10, 20, 50]
  correlation_windows: [20, 50, 100]
  wavelet:
    family: "db4"
    levels: 5
    denoise_remove_levels: [1, 2]
  prune_features: true
  max_features_ceiling: 25

# --- Models ---
models:
  # Signal weights for paper trading (must sum to 1.0)
  # NOTE: Ensemble gets 0.10 as "meta output reserve" — a constant allocation
  # for the blended aggregator confidence across all regimes.
  # These are NORMAL regime defaults; dynamic_weights.py adjusts per regime.
  signal_weights:
    wavelet: 0.30
    hmm: 0.20
    lstm: 0.15
    tft: 0.10
    genetic: 0.10
    hmm_pro: 0.12
    ensemble: 0.10

  wavelet:
    family: "db4"                # Daubechies-4 (optimal for financial series)
    levels: 5                    # 5 levels = tick → weekly decomposition
    threshold_method: "bayesshrink"  # bayesshrink | visushrink | sure
    threshold_mode: "soft"       # soft (shrinkage) | hard (zeroing)
    denoise_remove_levels: [1, 2]  # Zero out highest-frequency noise
    trend_slope_window: 5        # Bars for trend slope calculation
    energy_window: 20            # Window for energy ratio computation
    min_samples: 64              # Minimum samples for decomposition
    retrain_frequency: "hourly"

  hmm:
    n_regimes: 3                 # Growth(0) / Normal(1) / Crisis(2)
    covariance_type: "diag"      # diag (stable) | full (flexible)
    n_iter: 1000                 # Maximum EM iterations
    min_regime_duration: 5       # Anti-whipsaw: min bars before regime change
    regime_persistence_weight: 0.3  # Weight for regime persistence scoring
    vol_windows: [10, 20, 50]    # Volatility computation windows
    retrain_frequency: "daily"

  lstm:
    hidden_size: 128             # LSTM hidden dimension
    num_layers: 3                # Stacked LSTM layers
    bidirectional: true          # Bidirectional processing
    dropout: 0.2                 # Dropout rate
    sequence_length: 100         # Input sequence length (timesteps)
    batch_size: 256              # Training batch size
    learning_rate: 0.001         # Initial learning rate
    epochs: 100                  # Maximum training epochs
    patience: 10                 # Early stopping patience
    grad_clip: 1.0               # Gradient clipping max norm
    retrain_frequency: "weekly"

  tft:
    d_model: 64                  # Embedding dimension
    n_heads: 4                   # Multi-head attention heads
    n_layers: 2                  # Encoder/decoder layers
    dropout: 0.1                 # Dropout rate
    sequence_length: 60          # Input sequence length
    learning_rate: 0.0005        # Learning rate
    epochs: 80                   # Maximum epochs
    patience: 8                  # Early stopping patience
    batch_size: 128              # Batch size
    forecast_horizons: [1, 5, 10, 20]  # Multi-horizon (bars ahead)
    quantiles: [0.1, 0.25, 0.5, 0.75, 0.9]  # Quantile outputs
    retrain_frequency: "weekly"

  genetic:
    population_size: 200         # Chromosome population
    generations: 100             # Evolution generations
    crossover_prob: 0.7          # Crossover probability
    mutation_prob: 0.1           # Base mutation probability
    fitness: "sharpe_adjusted"   # Fitness function
    tournament_size: 5           # Tournament selection size
    elite_pct: 0.1               # Elitism percentage
    n_rules_per_chromosome: 8    # Trading rules per strategy
    retrain_frequency: "daily"

  hmm_pro:
    model_type: "GMMHMM"          # GMMHMM | GaussianHMM
    n_states: 4                    # Bullish / Neutral / Bearish / Reversal
    n_components: 3                # Gaussian mixture components per state
    covariance_type: "diag"        # diag (parameter-efficient)
    max_iter: 200                  # Baum-Welch EM iterations
    tol: 1e-4                      # Convergence tolerance
    min_covariance: 1e-3           # Regularization floor
    retrain_interval: 500          # Bars between retraining
    random_state: 42

  ensemble:
    method: "stacking"           # stacking | voting
    meta_learner: "xgboost"      # xgboost | random_forest
    n_estimators: 100            # Trees in meta-learner
    max_depth: 5                 # Max tree depth
    disagreement_penalty: 0.3    # Confidence penalty for model disagreement
    confidence_threshold: 0.25   # Min confidence for non-HOLD signal
    ewma_alpha: 0.1              # EWMA decay for accuracy tracking

# --- Risk Management ---
risk:
  meta_label:
    confidence_threshold: 0.55
    model: "xgboost"
  kelly:
    fraction: 0.5            # Half-Kelly
    max_position_pct: 0.05   # Max 5% of portfolio
    crisis_fraction: 0.25    # Quarter-Kelly in crisis
  circuit_breakers:
    min_confidence: 0.35
    time_filter_enabled: false
    allowed_regimes: ["GROWTH", "NORMAL", "CRISIS"]
    daily_loss_limit: 0.03   # 3% daily loss → halt (was 2%, too tight for $100K)
    drawdown_reduce: 0.05    # 5% DD → reduce by 50%
    drawdown_stop: 0.10      # 10% DD → stop all
    model_disagreement: 0.70 # 70% disagreement → min position
    max_latency_ms: 500      # Data feed latency limit
    cooldown_bars: 2         # Cooldown bars post confirmed regime switch (anti-whipsaw adds 3 more)
    min_bars_between_trades: 3
  monte_carlo:
    n_simulations: 100000
    run_frequency: "hourly"
    var_confidence: 0.95
    cvar_confidence: 0.99

# --- Backtesting ---
backtest:
  initial_capital: 100000
  commission_per_trade: 2.50     # USD
  slippage_bps: 1.0              # basis points
  walk_forward:
    train_years: 3
    test_years: 1
  targets:
    min_sharpe: 2.0
    max_drawdown: 0.10
    min_win_rate: 0.51
    min_profit_factor: 1.5
    dsr_pvalue: 0.05

# --- Execution ---
execution:
  broker: "ibkr"              # ibkr | cqg
  ibkr:
    host: "127.0.0.1"
    port: 7497                # Paper: 7497, Live: 7496
    client_id: 1
  order_type: "limit"         # Never market orders
  algo: "twap"                # twap | vwap
  max_slippage_bps: 3.0

# --- Monitoring ---
monitoring:
  grafana:
    port: 3000
  prometheus:
    port: 9090
    scrape_interval: "15s"

# --- Logging ---
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {module}:{function}:{line} | {message}"
  file: "logs/medallion.log"
  rotation: "100 MB"
  retention: "30 days"

# --- Phase 2: Data Pipeline ---
pipeline:
  ingestion:
    batch_size: 5000             # Rows per QuestDB ILP batch
    retry_attempts: 3
    retry_delay_seconds: 5
    history_years: 10            # Years of historical data to fetch
  data_quality:
    max_gap_hours: 1             # Alert if gap > 1 trading hour
    stale_threshold_minutes: 5   # Alert if data older than 5 min
    outlier_zscore: 5.0          # Flag returns with |Z| > 5
    min_bars_per_day: 300        # Expected minimum for 1-min bars
  feature_store:
    redis_prefix: "feature"
    ttl_days: 30                 # Keep features in Redis for 30 days
    archive_to_parquet: true     # Archive expired features to parquet
  schedule:
    daily_update_time: "06:00"   # UTC — before London open
    macro_update_time: "14:00"   # UTC — after US market open
  orchestrator:
    default_mode: "full"
    max_retries: 3
    retry_backoff_seconds: [5, 15, 30]
    parallel_fetches: false


