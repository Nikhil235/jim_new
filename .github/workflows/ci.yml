name: Strict CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  graphify-update:
    runs-on: ubuntu-latest
    name: Update Knowledge Graph
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install graphify
      run: |
        python -m pip install --upgrade pip
        pip install graphify
        
    - name: Update Graphify Knowledge Graph
      run: |
        graphify update . --force
        
    - name: Commit and push updated graph
      if: github.event_name != 'pull_request'
      run: |
        git config user.name "graphify-bot"
        git config user.email "graphify-bot@github.local"
        git add graphify-out/
        if git diff --cached --quiet; then
          echo "No changes to graph"
        else
          git commit -m "docs: auto-update knowledge graph [skip ci]"
          git push origin HEAD:${{ github.ref }}
        fi

  type-check-and-test:
    runs-on: ubuntu-latest
    needs: graphify-update
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-merged.txt
        pip install pytest pyright
        
    - name: Strict Type Checking (Pyright)
      run: |
        pyright src/
        
    - name: Run Unit Tests
      run: |
        pytest tests/ -v
